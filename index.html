<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- Prevents pinch-zoom and makes it fill the screen -->
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- iOS Specific PWA Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Maidenhead">

    <title>Maidenhead - Grid Tracker</title>

    <!-- Link to the Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- Leaflet Library (Local for Offline) -->
    <link rel="stylesheet" href="js/lib/leaflet.css">
    <script src="js/lib/leaflet.js"></script>

    <!-- COOP/COEP Header Helper (Required for SQLite WASM on GitHub Pages/Localhost) -->
    <script src="coi-serviceworker.js"></script>

    <!-- SQLite WASM Library (Non-module version) -->
    <script src="js/lib/sqlite3.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            /* Prevents bounce scrolling */
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #121212;
        }

        #overlay {
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 100;
            pointer-events: none;
            text-align: center;
        }

        .grid-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #grid-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: #fff;
        }

        #phonetic-text {
            font-size: 14px;
            color: #0A84FF;
            text-transform: uppercase;
            font-weight: 600;
            line-height: 1.4;
            letter-spacing: 1px;
        }

        #status-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            pointer-events: none;
        }

        /* Leaflet Overrides */
        .leaflet-container { background: #121212 !important; }
        .user-marker { filter: drop-shadow(0 0 5px rgba(10, 132, 255, 0.5)); }

        /* iOS Install Popup Styles */
        #ios-install-popup {
            position: fixed;
            bottom: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 350px;
            background: rgba(40, 40, 40, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            padding: 16px 20px;
            border-radius: 18px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            z-index: 1000;
            transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #ios-install-popup.show {
            bottom: 30px;
        }

        .ios-install-content {
            font-size: 14px;
            line-height: 1.5;
        }

        .ios-install-content strong {
            display: block;
            font-size: 16px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .ios-close-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .ios-close-btn:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        #ios-install-popup::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: rgba(40, 40, 40, 0.85) transparent transparent transparent;
            display: block;
            width: 0;
        }
            #sag-card {
            position: absolute;
            bottom: 60px;
            left: 20px;
            width: 320px;
            z-index: 100;
        }

        .sag-form {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        #sag-select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px;
            border-radius: 6px;
            flex: 1;
        }

        #sag-grid {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px;
            border-radius: 6px;
            width: 100px;
            text-transform: uppercase;
        }

        #sag-update {
            background: #0A84FF;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #sag-update:active {
            background: #007AFF;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            #grid-card { top: 10px; left: 10px; right: 10px; width: auto; }
            #sag-card { left: 10px; right: 10px; width: auto; bottom: 50px; }
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <!-- Maidenhead Overlay -->
    <div id="grid-card" class="glass-card">
        <div id="grid-text">LOCATING...</div>
        <div id="phonetic-text">WAITING FOR GPS</div>
    </div>

    <!-- SAG Vehicle Entry -->
    <div id="sag-card" class="glass-card">
        <div class="card-header" style="font-size: 10px; letter-spacing: 1px; color: rgba(255,255,255,0.6); margin-bottom: 5px;">SAG VEHICLE ENTRY</div>
        <div class="sag-form">
            <select id="sag-select">
                <!-- Will be populated by JS -->
            </select>
            <input type="text" id="sag-grid" placeholder="GRID" maxlength="10">
            <button id="sag-update">PLOT</button>
        </div>
    </div>

    <div id="status-bar">
        <span id="status">Booting Maidenhead...</span>
        <button id="online-toggle" style="margin-left: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 4px; font-size: 10px; padding: 2px 6px; cursor: pointer; pointer-events: auto;">Go Online</button>
    </div>

    <!-- iOS Install Popup -->
    <div id="ios-install-popup">
        <div class="ios-install-content">
            <strong>Install Maidenhead</strong>
            Tap <svg style="display:inline; width:18px; height:18px; vertical-align:middle; margin: 0 4px;" viewBox="0 0 50 50"><path fill="none" stroke="#0A84FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" d="M25,32 V10 M15,20 L25,10 L35,20 M12,30 V40 H38 V30"/></svg> and select <em>Add to Home Screen</em>.
        </div>
        <button class="ios-close-btn" onclick="document.getElementById('ios-install-popup').classList.remove('show')">&times;</button>
    </div>

    <!-- Import the main orchestrator as an ES6 Module -->
    <script type="module" src="./js/App.js"></script>

</body>

</html>
